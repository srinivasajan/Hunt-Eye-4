name: build-windows

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
          python -m pip install pyinstaller

      - name: Build (PyInstaller)
        run: |
          powershell -ExecutionPolicy Bypass -File tools/build.ps1 -PythonExe python -OneFile

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: HuntEye-windows
          path: |
            dist\HuntEye.exe
            dist\config.yaml
